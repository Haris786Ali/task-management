<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/base.css" rel="stylesheet">
    <title>Task Form</title>
</head>
<body>

<div class="container">
<h2 class="text-center mt-4 mb-4">Task Management System</h2>
<form id="taskForm" class="needs-validation" novalidate>
    <div class="mb-3">
        <label for="title" class="form-label">Title</label>
        <input type="text" required minlength="3"
               placeholder="Enter task title"
               id="title" name="title"
               class="form-control">
        <div class="invalid-feedback">
            Title must be at least 3 characters.
        </div>
    </div>

    <div class="mb-3">
        <label for="description" class="form-label">Description</label>
        <input type="text"
               placeholder="Enter task description (optional)"
               id="description" name="description"
               class="form-control">
    </div>

    <div class="mb-3">
        <label for="status" class="form-label">Status</label>
        <select id="status" name="status" class="form-control">
            <option value="TODO">To-do</option>
            <option value="IN_PROGRESS">In Progress</option>
            <option value="DONE">Done</option>
        </select>
    </div>

    <div class="mb-3">
        <label for="dueDate" class="form-label">Due Date</label>
        <input type="datetime-local"
               id="dueDate"
               name="dueDate"
               class="form-control"
               required>
        <div class="invalid-feedback">
            Please select a valid due date.
        </div>
    </div>
    <div class="d-flex justify-content-end gap-2 mt-3">
        <a href="index.html" class="btn btn-secondary btn-sm">Back</a>
        <button type="button" id="submitButton" class="btn btn-success btn-sm">Submit</button>
    </div>
</form>
</div>

<footer class="footer mt-auto py-3 bg-success text-white text-center fixed-bottom">
    <span>Task Management System</span>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/task-form.js"></script>
</body>
</html>
