<!doctype html>
<html lang="en">

<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Table of Tasks</title>
    <link href="css/base.css" rel="stylesheet">
</head>
<body>



<div class="container mt-4">
    <h2 class="text-center mt-4 mb-4">Task Management System</h2>
    <div class="card p-4">

        <a href="task-form.html" class="btn btn-success mb-3">Create New Task</a>

        <div class="d-flex gap-2 mb-3">
            <select id="searchField" class="form-control w-auto">
                <option value="title">Title</option>
                <option value="description">Description</option>
            </select>
            <input type="text" id="searchInput" class="form-control" placeholder="Search...">
        </div>

        <div class="d-flex gap-2 mb-3 justify-content-center">
            <button class="btn btn-secondary" onclick="filterByStatus('ALL')">All <span id="count-all">0</span></button>
            <button class="btn btn-warning" onclick="filterByStatus('TODO')">To-do <span id="count-todo">0</span></button>
            <button class="btn btn-primary" onclick="filterByStatus('IN_PROGRESS')">In Progress <span id="count-inprogress">0</span></button>
            <button class="btn btn-success" onclick="filterByStatus('DONE')">Done <span id="count-done">0</span></button>
        </div>

        <table id="task-table" class="task-table table table-bordered table-striped table-hover">
            <thead>
            <tr>
                <th>Title</th>
                <th>Description</th>
                <th>Status</th>
                <th>Due Date</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody id="task-table-body">
            <!-- Populated dynamically -->
            </tbody>
        </table>
    </div>
</div>

<footer class="footer mt-auto py-3 bg-success text-white text-center fixed-bottom">
    <span>Task Management System</span>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/index.js"></script>
</body>
</html>
