spring:
  flyway:
    url: jdbc:h2:mem:taskdb;DB_CLOSE_DELAY=-1
    user: sa
    password:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  application:
    name: task-management
  datasource:
    url: jdbc:h2:mem:taskdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
server:
  port: 8081